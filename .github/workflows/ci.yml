name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.9", "3.11", "3.13"]

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@0acd6d22b28b7e8f99b68a5db37e7af7b879a7ea # v5.3.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and dev dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v

  security:
    name: Security scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@0acd6d22b28b7e8f99b68a5db37e7af7b879a7ea # v5.3.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]" bandit pip-audit

      - name: Run Bandit static analysis
        run: bandit -r xmrdp/ -ll -x xmrdp/__pycache__

      - name: Run pip-audit dependency scan
        run: pip-audit
